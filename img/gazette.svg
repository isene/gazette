<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="gazette logo">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c2c4d"/>
      <stop offset="1" stop-color="#0b5fa5"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbf8f1"/>
      <stop offset="1" stop-color="#efe9da"/>
    </linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- app-icon background -->
  <rect x="0" y="0" width="256" height="256" rx="52" fill="url(#bg)"/>

  <!-- newspaper sheet, slightly tilted -->
  <g transform="rotate(-4 128 132)" filter="url(#sh)">
    <rect x="52" y="44" width="152" height="176" rx="9" fill="url(#paper)"/>
    <!-- folded top-right corner -->
    <path d="M188 44 H204 V60 Z" fill="#d9d2c0"/>

    <!-- masthead -->
    <text x="128" y="86" text-anchor="middle"
          font-family="Georgia, 'Times New Roman', serif" font-weight="700"
          font-size="30" fill="#0c2c4d" letter-spacing="0.5">Gazette</text>
    <rect x="68" y="95" width="120" height="2.4" fill="#0c2c4d"/>
    <rect x="68" y="100" width="120" height="1" fill="#0c2c4d"/>

    <!-- accent headline -->
    <rect x="68" y="114" width="84" height="6" rx="2" fill="#0b5fa5"/>

    <!-- left column body -->
    <g fill="#b9b2a1">
      <rect x="68" y="130" width="54" height="3" rx="1.5"/>
      <rect x="68" y="138" width="54" height="3" rx="1.5"/>
      <rect x="68" y="146" width="44" height="3" rx="1.5"/>
      <rect x="68" y="158" width="54" height="3" rx="1.5"/>
      <rect x="68" y="166" width="54" height="3" rx="1.5"/>
      <rect x="68" y="174" width="38" height="3" rx="1.5"/>
      <rect x="68" y="186" width="54" height="3" rx="1.5"/>
      <rect x="68" y="194" width="48" height="3" rx="1.5"/>
    </g>
    <!-- column divider -->
    <rect x="128" y="114" width="1" height="86" fill="#ddd6c6"/>
    <!-- right column body -->
    <g fill="#b9b2a1">
      <rect x="134" y="116" width="54" height="3" rx="1.5"/>
      <rect x="134" y="124" width="54" height="3" rx="1.5"/>
      <rect x="134" y="132" width="40" height="3" rx="1.5"/>
      <rect x="134" y="144" width="54" height="3" rx="1.5"/>
      <rect x="134" y="152" width="54" height="3" rx="1.5"/>
      <rect x="134" y="160" width="46" height="3" rx="1.5"/>
      <rect x="134" y="172" width="54" height="3" rx="1.5"/>
      <rect x="134" y="180" width="54" height="3" rx="1.5"/>
      <rect x="134" y="188" width="34" height="3" rx="1.5"/>
    </g>
  </g>
</svg>
