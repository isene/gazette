<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0a0a14"/>
    </linearGradient>
    <linearGradient id="rust" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f74c00"/>
      <stop offset="100%" style="stop-color:#b7410e"/>
    </linearGradient>
    <linearGradient id="paper" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f4efe2"/>
      <stop offset="100%" style="stop-color:#ddd2bb"/>
    </linearGradient>
  </defs>
  <style>
    @keyframes pulse { 0%,100% { opacity:0.8; } 50% { opacity:1; } }
    .lead { animation: pulse 2.6s ease-in-out infinite; }
  </style>

  <circle cx="128" cy="128" r="120" fill="url(#bg)" stroke="url(#rust)" stroke-width="3"/>

  <!-- newspaper sheet, slightly tilted -->
  <g transform="rotate(-5 128 116)">
    <rect x="64" y="50" width="128" height="124" rx="6" fill="url(#paper)" stroke="#b7410e" stroke-width="1.5"/>
    <!-- folded top-right corner -->
    <path d="M178 50 H192 V64 Z" fill="#cabfa6"/>

    <!-- masthead -->
    <text x="128" y="76" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
          font-weight="700" font-size="19" fill="#0a0a14" letter-spacing="1.5">GAZETTE</text>
    <rect x="74" y="84" width="108" height="2" fill="#0a0a14"/>

    <!-- lead headline (rust) -->
    <rect class="lead" x="74" y="95" width="108" height="7" rx="1.5" fill="url(#rust)"/>

    <!-- two columns of body lines -->
    <g fill="#6b6256">
      <rect x="74"  y="111" width="46" height="3" rx="1"/>
      <rect x="74"  y="119" width="46" height="3" rx="1"/>
      <rect x="74"  y="127" width="46" height="3" rx="1"/>
      <rect x="74"  y="135" width="46" height="3" rx="1"/>
      <rect x="74"  y="143" width="38" height="3" rx="1"/>
      <rect x="136" y="111" width="46" height="3" rx="1"/>
      <rect x="136" y="119" width="46" height="3" rx="1"/>
      <rect x="136" y="127" width="46" height="3" rx="1"/>
      <rect x="136" y="135" width="46" height="3" rx="1"/>
      <rect x="136" y="143" width="42" height="3" rx="1"/>
    </g>
    <!-- column divider -->
    <rect x="127" y="109" width="1" height="40" fill="#b7410e" opacity="0.4"/>

    <!-- sub-headline -->
    <rect x="74" y="156" width="68" height="5" rx="1.5" fill="#0a0a14" opacity="0.7"/>
  </g>

  <text x="128" y="206" font-family="monospace" font-size="22" font-weight="bold"
        fill="url(#rust)" text-anchor="middle" letter-spacing="3">gazette</text>
  <text x="128" y="223" font-family="monospace" font-size="8" fill="#888" text-anchor="middle">daily news digest</text>
</svg>
